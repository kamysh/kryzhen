name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: linux-amd64
          - runner: ubuntu-24.04-arm
            artifact: linux-arm64
          - runner: macos-latest
            artifact: darwin-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          flakehub: false

      - name: Build
        run: nix build .#kryzhen-static

      - name: Stage binary
        run: install -m 755 result/bin/kryzhen kryzhen-${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: kryzhen-${{ matrix.artifact }}
          path: kryzhen-${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            kryzhen-linux-amd64/kryzhen-linux-amd64
            kryzhen-linux-arm64/kryzhen-linux-arm64
            kryzhen-darwin-arm64/kryzhen-darwin-arm64
